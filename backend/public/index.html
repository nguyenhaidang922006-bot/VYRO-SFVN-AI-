<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VYRO SFVN AI Terminal</title>
<link rel="stylesheet" href="/style.css"/>
</head>
<body>
<div class="app">
<aside>
  <div class="logo">VYRO</div>
  <div class="subtitle">SFVN AI TERMINAL</div>
  <label>Symbol</label>
  <input value="CP2CON26" readonly/>
  <button id="connectBtn">CONNECT</button>
  <div class="info">Status: <b id="status">CONNECTING</b></div>
  <div class="info">Update: <b id="updated">--</b></div>
</aside>
<main>
<header>
  <div><h1>VYRO SFVN Commodity AI Terminal</h1><p>SFVN API → AI Indicator Engine → Dashboard realtime</p></div>
  <div class="quote"><div>CP2CON26</div><div class="price" id="last">--</div><div>Bid <b id="bid">--</b> / Ask <b id="ask">--</b></div></div>
</header>
<section class="layout">
  <div class="panel"><canvas id="chart" width="1000" height="560"></canvas></div>
  <div class="panel matrix">
    <h2>AI Signal Matrix</h2>
    <div class="cards">
      <div class="card"><span>Signal</span><b id="signal">WAIT</b></div>
      <div class="card"><span>Confidence</span><b id="confidence">--</b></div>
      <div class="card"><span>Structure</span><b id="structure">--</b></div>
      <div class="card"><span>Bias</span><b id="bias">--</b></div>
      <div class="card"><span>Liquidity</span><b id="liquidity">--</b></div>
      <div class="card"><span>Stop Hunt</span><b id="stopHunt">--</b></div>
      <div class="card"><span>Supply</span><b id="supply">--</b></div>
      <div class="card"><span>Demand</span><b id="demand">--</b></div>
      <div class="card"><span>Delta</span><b id="delta">--</b></div>
      <div class="card"><span>Flow</span><b id="flow">--</b></div>
    </div>
  </div>
</section>
</main>
</div>
<script src="/script.js"></script>
</body>
</html>
