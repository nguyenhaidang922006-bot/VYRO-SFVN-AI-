<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>VYRO Hidden Admin</title><link rel="stylesheet" href="/style.css"/></head>
<body>
<div class="login" id="adminLogin"><div class="loginBox"><div class="logo big">VYRO</div><h2>Admin Ẩn</h2><p>Nhập pass admin để quản trị.</p><input id="adminPass" type="password" placeholder="ADMIN_PASS"/><button onclick="adminLogin()">VÀO ADMIN</button><div id="adminMsg" class="err"></div></div></div>
<div class="admin hidden" id="adminPanel"><h1>VYRO Hidden Admin</h1><div class="adminGrid">
<div class="panel"><h2>Mã khách</h2><label>Access Code</label><input id="accessCodeInput"/><button onclick="saveAdmin()">LƯU MÃ KHÁCH</button></div>
<div class="panel"><h2>Mã đang chạy</h2><label>Active Symbol</label><input id="activeSymbolInput"/><button onclick="saveAdmin()">LƯU MÃ GIAO DỊCH</button><p class="hint">Vàng/bạc/cafe copy đúng tick symbol SFVN vào đây.</p></div>
<div class="panel full"><h2>Danh sách mã nhanh</h2><div id="symbolsBox"></div><button onclick="saveSymbols()">LƯU DANH SÁCH MÃ</button></div>
</div></div><script src="/admin.js"></script></body></html>
